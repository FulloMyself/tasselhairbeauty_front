<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tassel Hair & Beauty Studio</title>
  <script type="text/javascript">
    var path = window.location.pathname;
    var base = '/tasselhairbeauty_front';
    
    if (path.startsWith(base)) {
      var route = path.replace(base, '') || '/';
      sessionStorage.setItem('redirect', route);
    }
    window.location.replace(base + '/');
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
